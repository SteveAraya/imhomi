<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 60">
  <!-- "d" stylized as monkey head -->
  <g transform="translate(5, 5)">
    <!-- Main "d" shape / monkey ear left -->
    <circle cx="18" cy="22" r="9" fill="none" stroke="#C77DFF" stroke-width="4.5" stroke-linecap="round"/>
    <!-- Vertical stroke of "d" -->
    <line x1="27" y1="2" x2="27" y2="42" stroke="#C77DFF" stroke-width="4.5" stroke-linecap="round"/>
    <!-- Dot / eye -->
    <circle cx="18" cy="20" r="2.5" fill="#FF6B9D"/>
    <!-- "i" dot -->
    <circle cx="38" cy="8" r="3" fill="#5EEDC0"/>
  </g>
  <!-- "monkey" text -->
  <text x="55" y="38" font-family="'Poppins', 'Inter', sans-serif" font-size="28" font-weight="600" fill="#5EEDC0" letter-spacing="1">monkey</text>
</svg>
